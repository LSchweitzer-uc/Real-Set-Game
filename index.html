<!DOCTYPE html>
<html>
<head>
  <title>Real Set</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Real Set</h1>

  <p>Select a set of 3+ reals that add up to 0 or multiply to 1 to score points</p>

  <div class="controls">
  <button onclick="startGame()">Start Game</button>
  <button onclick="stopGame()">Stop Game</button>
  </div>
  
  <div class="stats">
    <p>Time Remaining: <span id="time">120</span>s</p>
    <p>Score: <span id="score">0</span></p>
    
  </div>
 
  
  <div id="numbers"></div>
  
  <div class="actions">
    <button id="submitBtn">Submit Set</button>
    <button onclick="handleDrawCard()">Draw Card</button>
  </div>
  
  <p id="result"></p>


  <script src="script.js"></script>
</body>
</html>
